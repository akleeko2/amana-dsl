<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amana Live Compiler</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Amana Live Compiler</p>
      <h1>محرر Amana مع معاينة مباشرة</h1>
    </div>
    <div class="toolbar">
      <label class="toggle">
        <input id="autoPreview" type="checkbox" checked>
        <span>Auto preview</span>
      </label>
      <button id="saveBtn" type="button">Save</button>
      <button id="checkBtn" type="button">Check</button>
      <button id="formatBtn" type="button">Format</button>
      <button id="inspectBtn" type="button">Inspect</button>
      <button id="buildBtn" class="primary" type="button">Build + Preview</button>
      <button id="stopBtn" type="button">Stop</button>
    </div>
  </header>

  <main class="workspace">
    <section class="pane editor-pane">
      <div class="pane-head">
        <strong>workspace/app.amana</strong>
        <span id="saveState">loading</span>
      </div>
      <textarea id="editor" spellcheck="false"></textarea>
    </section>

    <section class="pane preview-pane">
      <div class="pane-head">
        <strong>Preview</strong>
        <div class="preview-actions">
          <a id="openPreview" href="/preview/" target="_blank" rel="noreferrer">Open tab</a>
          <span id="previewState">not running</span>
        </div>
      </div>
      <iframe id="preview" title="Amana preview"></iframe>
    </section>
  </main>

  <aside class="bottom-panel">
    <section>
      <div class="pane-head">
        <strong>Diagnostics</strong>
        <span id="lastAction">idle</span>
      </div>
      <pre id="diagnostics"></pre>
    </section>
    <section>
      <div class="pane-head">
        <strong>Preview logs</strong>
        <span id="compilerState">ready</span>
      </div>
      <pre id="logs"></pre>
    </section>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
